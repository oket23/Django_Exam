<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FitFlow{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
{% if not user.is_authenticated %}
<nav class="navbar">
    <div class="logo">FitFlow</div>
</nav>
{% endif %}

<div class="container">
    {% block content %}{% endblock %}
</div>

{% if user.is_authenticated %}
<nav class="bottom-nav">
    <a href="{% url 'home' %}" class="nav-item {% if request.path == '/' %}active{% endif %}">
        <svg viewBox="0 0 24 24">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        Дашборд
    </a>
    <div class="nav-item fab-container">
        <button id="mainAddBtn" class="fab-btn">+</button>
    </div>
    <a href="{% url 'profile-setup' %}" class="nav-item {% if request.path == '/profile/' %}active{% endif %}">
        <svg viewBox="0 0 24 24">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </svg>
        Профіль
    </a>
</nav>
{% endif %}

<div id="toast-container"></div>

<div id="customConfirmModal" class="modal">
    <div class="modal-content" style="text-align: center; max-width: 300px;">
        <h3 style="margin-top: 0; color: #e74c3c;">Підтвердження</h3>
        <p>Ви дійсно хочете видалити цей запис?</p>
        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button id="btnConfirmDelete" class="btn-primary" style="background: #e74c3c; margin: 0; flex: 1;">
                Видалити
            </button>
            <button id="btnCancelDelete" class="btn-primary" style="background: #555; margin: 0; flex: 1;">Скасувати
            </button>
        </div>
    </div>
</div>

<script>
    // Глобальна функція для красивих сповіщень
    function showToast(message, type = 'success') {
        const container = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.innerText = message;
        container.appendChild(toast);
        setTimeout(() => { toast.remove(); }, 3000);
    }
</script>

{% block scripts %}{% endblock %}
</body>
</html>
