<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Налаштування профілю</title>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 400px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 10px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #219150; }
        .nav-link { text-align: center; display: block; margin-top: 15px; color: #3498db; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>⚙️ Налаштування профілю</h2>
        <form id="profileForm">
            <div class="form-group">
                <label>Стать</label>
                <select id="gender">
                    <option value="M">Чоловік</option>
                    <option value="F">Жінка</option>
                </select>
            </div>
            <div class="form-group">
                <label>Дата народження</label>
                <input type="date" id="birth_date">
            </div>
            <div class="form-group">
                <label>Зріст (см)</label>
                <input type="number" id="height" step="0.1">
            </div>
            <div class="form-group">
                <label>Цільова вага (кг)</label>
                <input type="number" id="target_weight" step="0.1">
            </div>
            <div class="form-group">
                <label>Ціль</label>
                <select id="goal">
                    <option value="cut">Схуднення</option>
                    <option value="maintain">Підтримка</option>
                    <option value="bulk">Набір маси</option>
                </select>
            </div>
            <div class="form-group">
                <label>Активність</label>
                <select id="activity_level">
                    <option value="sedentary">Сидячий</option>
                    <option value="light">Легка</option>
                    <option value="moderate">Середня</option>
                    <option value="active">Висока</option>
                </select>
            </div>
            <button type="submit">Зберегти та перейти до Дашборду</button>
        </form>
        <a href="/" class="nav-link">Пропустити та перейти до Дашборду →</a>
    </div>

    <script>
        // При завантаженні отримуємо поточні дані, щоб форма не була порожньою
        fetch('/api/profile/')
            .then(res => res.json())
            .then(data => {
                if (data.gender) document.getElementById('gender').value = data.gender;
                if (data.birth_date) document.getElementById('birth_date').value = data.birth_date;
                if (data.height) document.getElementById('height').value = data.height;
                if (data.target_weight) document.getElementById('target_weight').value = data.target_weight;
                if (data.goal) document.getElementById('goal').value = data.goal;
                if (data.activity_level) document.getElementById('activity_level').value = data.activity_level;
            });

        // Відправка даних через PATCH
        document.getElementById('profileForm').onsubmit = function(e) {
            e.preventDefault();
            const body = {
                gender: document.getElementById('gender').value,
                birth_date: document.getElementById('birth_date').value,
                height: document.getElementById('height').value,
                target_weight: document.getElementById('target_weight').value,
                goal: document.getElementById('goal').value,
                activity_level: document.getElementById('activity_level').value,
            };

            fetch('/api/profile/', {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}' // Для безпеки Django
                },
                body: JSON.stringify(body)
            }).then(res => {
                if (res.ok) window.location.href = '/';
                else alert('Помилка при збереженні');
            });
        };
    </script>
</body>
</html>
