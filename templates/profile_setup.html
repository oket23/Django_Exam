{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="profile-dashboard">
    <div class="profile-header card">
        <div class="user-info-main">
            <div class="avatar-circle">
                <img src="https://ui-avatars.com/api/?name={{ user.first_name }}+{{ user.last_name }}&background=2ecc71&color=fff&size=128"
                     alt="Avatar">
            </div>
            <div class="user-text">
                <h2 id="display_full_name">Завантаження...</h2>
                <p id="display_email">{{ user.email }}</p>
            </div>
        </div>
    </div>

    <div class="metrics-grid">
        <div class="metric-card card">
            <div class="metric-icon" style="background: rgba(52, 152, 219, 0.2); color: #3498db;">⚖️</div>
            <div class="metric-val">
                <span id="display_weight">--</span>
                <small>кг</small>
            </div>
            <div class="metric-label">Вага</div>
        </div>
        <div class="metric-card card">
            <div class="metric-icon" style="background: rgba(46, 204, 113, 0.2); color: #2ecc71;">📏</div>
            <div class="metric-val">
                <span id="display_height">--</span>
                <small>см</small>
            </div>
            <div class="metric-label">Зріст</div>
        </div>
        <div class="metric-card card">
            <div class="metric-icon" style="background: rgba(155, 89, 182, 0.2); color: #9b59b6;">🎂</div>
            <div class="metric-val">
                <span id="display_age">--</span>
                <small>р.</small>
            </div>
            <div class="metric-label">Вік</div>
        </div>
        <div class="metric-card card">
            <div class="metric-icon" style="background: rgba(230, 126, 34, 0.2); color: #e67e22;">🧬</div>
            <div class="metric-val">
                <span id="display_bmi">--</span>
            </div>
            <div class="metric-label">Індекс маси (BMI)</div>
        </div>
    </div>

    <div class="card settings-card">
        <h3>Налаштування та цілі</h3>
        <form id="profileForm">
            <div class="form-row">
                <div class="form-group">
                    <label>Ім'я</label>
                    <input type="text" id="first_name" required>
                </div>
                <div class="form-group">
                    <label>Прізвище</label>
                    <input type="text" id="last_name" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Стать</label>
                    <select id="gender">
                        <option value="M">Чоловік</option>
                        <option value="F">Жінка</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Дата народження</label>
                    <input type="date" id="birth_date" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Поточна вага (кг)</label>
                    <input type="number" id="current_weight" step="0.1" required>
                </div>
                <div class="form-group">
                    <label>Цільова вага (кг)</label>
                    <input type="number" id="target_weight" step="0.1" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Зріст (см)</label>
                    <input type="number" id="height" step="0.1" required>
                </div>
                <div class="form-group">
                    <label>Активність</label>
                    <select id="activity_level">
                        <option value="sedentary">Сидячий</option>
                        <option value="light">Легка</option>
                        <option value="moderate">Середня</option>
                        <option value="active">Висока</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>Основна ціль</label>
                <select id="goal">
                    <option value="cut">Схуднення</option>
                    <option value="maintain">Підтримка</option>
                    <option value="bulk">Набір маси</option>
                </select>
            </div>

            <button type="submit" class="btn-primary" style="margin-top: 20px;">ЗБЕРЕГТИ ЗМІНИ</button>
        </form>

        <a href="{% url 'logout' %}" class="btn-primary"
           style="background: #e74c3c; text-decoration: none; display: block; text-align: center; margin-top: 15px;">
            ВИЙТИ З АКАУНТУ
        </a>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{% static 'js/profile_setup.js' %}"></script>
{% endblock %}
