{% extends 'base.html' %}
{% load static %}

{% block title %}Мій Дашборд | FitFlow{% endblock %}

{% block content %}
    <h1>Огляд прогресу</h1>

    <div class="stats-grid">
        <div class="card" id="goals-card">
            <h3>Цілі на сьогодні</h3>
            <p>Завантаження...</p>
        </div>

        <div class="card" id="progress-card">
            <h3>Прогрес за день</h3>
            <p>Завантаження...</p>
        </div>
    </div>

    <div class="card">
        <h3>Історія зміни ваги</h3>
        <canvas id="weightChart" height="100"></canvas>
    </div>
{% endblock %}

{% block scripts %}
    <script src="{% static 'js/dashboard.js' %}"></script>
{% endblock %}
